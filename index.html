<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Kontrak Sewa</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="bg-white border-b border-gray-200 p-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl md:text-2xl font-bold text-teal-800 tracking-wide text-center sm:text-left uppercase w-full">
                SEWA GUNA USAHA (SGU) GEDUNG KANTOR
            </h1>
            <button onclick="bagikanLink()" class="flex items-center gap-2 bg-teal-600 hover:bg-teal-700 text-white font-medium px-4 py-2 rounded-xl shadow-sm transition-all cursor-pointer whitespace-nowrap text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 1 0 0 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186 9.566-5.314m-9.566 7.5 9.566 5.314m0 0a2.25 2.25 0 1 0 3.935 2.186 2.25 2.25 0 0 0-3.935-2.186Zm0-12.814a2.25 2.25 0 1 0 3.933-2.185 2.25 2.25 0 0 0-3.933 2.185Z" />
                </svg>
                Bagikan Link
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        
        <!-- Filter Row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-8">
            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Area</label>
                <select id="filter-area" onchange="applyFilters()" class="w-full bg-emerald-100 text-emerald-900 font-medium px-3 py-3 rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">AREA: SEMUA</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Cabang</label>
                <select id="filter-cabang" onchange="applyFilters()" class="w-full bg-emerald-100 text-emerald-900 font-medium px-3 py-3 rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">CABANG: SEMUA</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Outlet</label>
                <select id="filter-outlet" onchange="applyFilters()" class="w-full bg-emerald-100 text-emerald-900 font-medium px-3 py-3 rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">OUTLET: SEMUA</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Status Sewa</label>
                <select id="filter-status" onchange="applyFilters()" class="w-full bg-emerald-100 text-emerald-900 font-medium px-3 py-3 rounded-xl border border-emerald-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">STATUS: SEMUA</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Kondisi Tempo (Live)</label>
                <select id="filter-tempo" onchange="applyFilters()" class="w-full bg-amber-100 text-amber-900 font-bold px-3 py-3 rounded-xl border border-amber-200 focus:outline-none focus:ring-2 focus:ring-amber-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">TEMPO: SEMUA</option>
                    <option value="AKTIF">✅ MASIH AKTIF</option>
                    <option value="PERINGATAN">⚠️ KRITIS (≤ H-30 / LEWAT TEMPO)</option>
                </select>
            </div>

            <div class="relative">
                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Bulan Mulai Sewa</label>
                <select id="filter-mulai-bulan" onchange="applyFilters()" class="w-full bg-blue-100 text-blue-900 font-medium px-3 py-3 rounded-xl border border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer appearance-none shadow-sm text-xs">
                    <option value="ALL">MULAI: SEMUA BULAN</option>
                    <option value="0">Januari</option>
                    <option value="1">Februari</option>
                    <option value="2">Maret</option>
                    <option value="3">April</option>
                    <option value="4">Mei</option>
                    <option value="5">Juni</option>
                    <option value="6">Juli</option>
                    <option value="7">Agustus</option>
                    <option value="8">September</option>
                    <option value="9">Oktober</option>
                    <option value="10">November</option>
                    <option value="11">Desember</option>
                </select>
            </div>
        </div>

        <!-- Table Container -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-800">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-white uppercase">Area</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-white uppercase">Cabang</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-white uppercase">Outlet</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-white uppercase">Status</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-white uppercase">Mulai Sewa</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-white uppercase">Akhir Sewa</th>
                            <th class="px-6 py-4 text-center text-xs font-semibold text-white uppercase">Masa Sewa</th>
                            <th class="px-6 py-4 text-right text-xs font-semibold text-white uppercase">Nilai Sewa</th>
                            <th class="px-6 py-4 text-left text-xs font-semibold text-white uppercase">Email PJ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-200 bg-white text-sm text-gray-700">
                        <tr>
                            <td colspan="9" class="px-6 py-12 text-center text-gray-500 font-medium animate-pulse">
                                Memuat data terbaru dari Google Sheets...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-gray-900 text-white px-5 py-3 rounded-xl shadow-lg transition-all duration-300 transform translate-y-20 opacity-0 pointer-events-none text-sm font-medium z-50">
        Tautan berhasil disalin ke papan klip!
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwtOLdAqmdBdkBmifZl4oDkOH5p7EqBEb_EOrnX9oDcg4BcOlvmvxeCzEaDqCcaDezK/exec";
        
        let ALL_DATA = [];

        function parseTanggalIndo(txt) {
            if (!txt) return null;
            if (txt instanceof Date) return txt;
            
            const stringTeks = txt.toString().trim();
            const parts = stringTeks.split(' ');
            if (parts.length < 3) {
                const parsedDirect = new Date(stringTeks);
                return isNaN(parsedDirect.getTime()) ? null : parsedDirect;
            }

            const bindo = {
                januari: 0, februari: 1, maret: 2, april: 3, mei: 4, juni: 5,
                juli: 6, agustus: 7, september: 8, oktober: 9, november: 10, desember: 11,
                jan: 0, feb: 1, mar: 2, apr: 3, jun: 5, jul: 6, ags: 7, sep: 8, okt: 9, nov: 10, des: 11
            };

            const tgl = parseInt(parts[0], 10);
            const blnString = parts[1].toLowerCase();
            const thn = parseInt(parts[2], 10);

            if (bindo[blnString] !== undefined && !isNaN(tgl) && !isNaN(thn)) {
                return new Date(thn, bindo[blnString], tgl);
            }
            
            const fallbackDate = new Date(stringTeks);
            return isNaN(fallbackDate.getTime()) ? null : fallbackDate;
        }

        function formatTanggal(tanggalRaw) {
            if (!tanggalRaw) return '-';
            const date = parseTanggalIndo(tanggalRaw);
            if (!date) return tanggalRaw;
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function formatRupiah(nilaiRaw) {
            if (nilaiRaw === undefined || nilaiRaw === null || nilaiRaw === '') return '-';
            let cleanString = nilaiRaw.toString().replace(/[^0-9]/g, '');
            const angka = Number(cleanString);
            if (isNaN(angka) || angka === 0) return nilaiRaw; 
            return 'Rp ' + angka.toLocaleString('id-ID');
        }

        async function loadDashboardData() {
            try {
                const response = await fetch(API_URL);
                const rawJson = await response.json();
                
                ALL_DATA = rawJson.map(row => {
                    return {
                        area: row.area || '-',
                        cabang: row.cabang || '-',
                        outlet: row.outlet || '-',
                        status: row.status || '-',
                        mulai_sewa: row.mulai_sewa || '-',
                        akhir_sewa: row.akhir_sewa || '-',
                        masa_sewa: row.masa_sewa || '-',
                        nilai_sewa: row.nilai_sewa || '-',
                        email: row.email || '-'
                    };
                });
                
                populateDropdown('filter-area', 'area', 'AREA');
                populateDropdown('filter-cabang', 'cabang', 'CABANG');
                populateDropdown('filter-outlet', 'outlet', 'OUTLET');
                populateDropdown('filter-status', 'status', 'STATUS');

                setFiltersFromURL();
                applyFilters();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('table-body').innerHTML = `
                    <tr><td colspan="9" class="px-6 py-8 text-center text-red-600 font-medium">Gagal memuat data. Periksa kembali URL Web App Anda.</td></tr>`;
            }
        }

        function populateDropdown(elementId, objectKey, labelText) {
            const dropdown = document.getElementById(elementId);
            const uniqueValues = [...new Set(ALL_DATA.map(item => item[objectKey]).filter(v => v && v !== '-'))];
            
            dropdown.innerHTML = `<option value="ALL">${labelText}: SEMUA</option>`;
            
            uniqueValues.forEach(value => {
                const opt = document.createElement('option');
                opt.value = value;
                opt.textContent = `${labelText}: ${value.toUpperCase()}`;
                dropdown.appendChild(opt);
            });
        }

        function setFiltersFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const area = urlParams.get('area');
            const cabang = urlParams.get('cabang');
            const outlet = urlParams.get('outlet');
            const status = urlParams.get('status');
            const tempo = urlParams.get('tempo');
            const mulaiBulan = urlParams.get('mulai_bulan');

            if (area) document.getElementById('filter-area').value = area;
            if (cabang) document.getElementById('filter-cabang').value = cabang;
            if (outlet) document.getElementById('filter-outlet').value = outlet;
            if (status) document.getElementById('filter-status').value = status;
            if (tempo) document.getElementById('filter-tempo').value = tempo;
            if (mulaiBulan) document.getElementById('filter-mulai-bulan').value = mulaiBulan;
        }

        function hitungSisaHari(akhirSewaStr) {
            if (!akhirSewaStr) return null;
            const akhirDate = parseTanggalIndo(akhirSewaStr);
            if (!akhirDate) return null;

            const hariIni = new Date();
            hariIni.setHours(0,0,0,0);
            akhirDate.setHours(0,0,0,0);

            // Hitung selisih milidetik dan konversi ke hari
            const selisihWaktu = akhirDate.getTime() - hariIni.getTime();
            const sisaHari = Math.ceil(selisihWaktu / (1000 * 3600 * 24));
            return sisaHari;
        }

        function applyFilters() {
            const selectedArea = document.getElementById('filter-area').value;
            const selectedCabang = document.getElementById('filter-cabang').value;
            const selectedOutlet = document.getElementById('filter-outlet').value;
            const selectedStatus = document.getElementById('filter-status').value;
            const selectedTempo = document.getElementById('filter-tempo').value;
            const selectedMulaiBulan = document.getElementById('filter-mulai-bulan').value;

            const url = new URL(window.location.href);
            
            if (selectedArea !== "ALL") url.searchParams.set('area', selectedArea); else url.searchParams.delete('area');
            if (selectedCabang !== "ALL") url.searchParams.set('cabang', selectedCabang); else url.searchParams.delete('cabang');
            if (selectedOutlet !== "ALL") url.searchParams.set('outlet', selectedOutlet); else url.searchParams.delete('outlet');
            if (selectedStatus !== "ALL") url.searchParams.set('status', selectedStatus); else url.searchParams.delete('status');
            if (selectedTempo !== "ALL") url.searchParams.set('tempo', selectedTempo); else url.searchParams.delete('tempo');
            if (selectedMulaiBulan !== "ALL") url.searchParams.set('mulai_bulan', selectedMulaiBulan); else url.searchParams.delete('mulai_bulan');
            
            window.history.replaceState({}, '', url);

            const filteredData = ALL_DATA.filter(row => {
                const matchArea = (selectedArea === "ALL" || row.area === selectedArea);
                const matchCabang = (selectedCabang === "ALL" || row.cabang === selectedCabang);
                const matchOutlet = (selectedOutlet === "ALL" || row.outlet === selectedOutlet);
                const matchStatus = (selectedStatus === "ALL" || row.status === selectedStatus);
                
                const sisaHari = hitungSisaHari(row.akhir_sewa);
                const isKritis = (sisaHari !== null && sisaHari <= 30); // true jika H-30 ke bawah atau sudah lewat

                let matchTempo = true;
                if (selectedTempo === "AKTIF" && isKritis) matchTempo = false;
                if (selectedTempo === "PERINGATAN" && !isKritis) matchTempo = false;

                let matchBulan = true;
                if (selectedMulaiBulan !== "ALL" && row.mulai_sewa) {
                    const mulaiDate = parseTanggalIndo(row.mulai_sewa);
                    if (mulaiDate) {
                        if (mulaiDate.getMonth().toString() !== selectedMulaiBulan) {
                            matchBulan = false;
                        }
                    } else {
                        matchBulan = false;
                    }
                }

                return matchArea && matchCabang && matchOutlet && matchStatus && matchTempo && matchBulan;
            });

            renderTable(filteredData);
        }

        function renderTable(dataToDisplay) {
            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = '';

            if (dataToDisplay.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="9" class="px-6 py-8 text-center text-gray-400">Tidak ada data kontrak yang cocok dengan filter.</td></tr>`;
                return;
            }

            dataToDisplay.forEach(row => {
                const tr = document.createElement('tr');
                
                const sisaHari = hitungSisaHari(row.akhir_sewa);
                
                // Deteksi otomatis status H-30 atau Lewat Tempo
                let isKritis = false;
                let statusLabel = row.status;
                let badgeClass = "bg-blue-100 text-blue-800";

                if (sisaHari !== null) {
                    if (sisaHari < 0) {
                        isKritis = true;
                        statusLabel = `Lewat ${Math.abs(sisaHari)} Hari`;
                        badgeClass = "bg-red-200 text-red-900";
                    } else if (sisaHari <= 30) {
                        isKritis = true;
                        statusLabel = `H-${sisaHari} Tempo`;
                        badgeClass = "bg-amber-200 text-amber-900";
                    }
                }

                // Berikan baris warna merah jika sudah masuk masa kritis (H-30 atau lewat)
                if (isKritis) {
                    tr.className = 'bg-red-50 text-red-950 font-medium hover:bg-red-100 transition-colors border-l-4 border-red-500';
                } else {
                    tr.className = 'hover:bg-gray-50 transition-colors';
                }
                
                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap font-semibold ${isKritis ? 'text-red-950' : 'text-gray-950'}">${row.area}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${row.cabang}</td>
                    <td class="px-6 py-4 whitespace-nowrap">${row.outlet}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">
                        <span class="px-2 py-1 text-xs font-bold rounded-full ${badgeClass}">
                            ${statusLabel}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">${formatTanggal(row.mulai_sewa)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center font-semibold">${formatTanggal(row.akhir_sewa)}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center">${row.masa_sewa}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-right font-medium ${isKritis ? 'text-red-800' : 'text-gray-900'}">${formatRupiah(row.nilai_sewa)}</td>
                    <td class="px-6 py-4 whitespace-nowrap font-mono ${isKritis ? 'text-red-700' : 'text-blue-600'}">${row.email}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function bagikanLink() {
            const currentUrl = window.location.href;
            navigator.clipboard.writeText(currentUrl).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('translate-y-20', 'opacity-0', 'pointer-events-none');
                toast.classList.add('translate-y-0', 'opacity-100');
                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-20', 'opacity-0', 'pointer-events-none');
                }, 3000);
            }).catch(err => {
                console.error('Gagal menyalin tautan: ', err);
            });
        }

        loadDashboardData();
    </script>
</body>
</html>
